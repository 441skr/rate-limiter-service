server:
  port: 8080

spring:
  application:
    name: rate-limiter-service
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  redis:
    ssl:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
